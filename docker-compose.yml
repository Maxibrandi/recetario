services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: recetas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    # Cambiamos main:app por backend.main:app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/recetas_db
    depends_on:
      - db

volumes:
  postgres_data: